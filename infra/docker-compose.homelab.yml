version: '3.8'
services:
  db:
    image: postgres:15-alpine
    env_file:
      - ./.env.homelab
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - agentescala_postgres_data:/var/lib/postgresql/data
    networks:
      - agentescala_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${AGENTESCALA_IMAGE}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    env_file:
      - ./.env.homelab
    ports:
      - "${BACKEND_BIND_ADDRESS}:${BACKEND_HOST_PORT}:8030"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      LOG_LEVEL: ${LOG_LEVEL}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      METRICS_ENABLED: ${METRICS_ENABLED}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agentescala_internal
    command: >
      /bin/sh -c "cd /app/backend && alembic upgrade head &&
      cd /app && uvicorn backend.main:app --host 0.0.0.0 --port 8030 --proxy-headers --forwarded-allow-ips='*'"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8030/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  agentescala_postgres_data:
    driver: local
    name: ${POSTGRES_VOLUME_NAME}

networks:
  agentescala_internal:
    driver: bridge
    name: ${INTERNAL_NETWORK_NAME}
