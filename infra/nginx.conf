worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    server {
        listen 8030;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            try_files $uri =404;
            access_log off;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location = /favicon.ico {
            try_files $uri =404;
            access_log off;
        }

        location = /vite.svg {
            try_files $uri =404;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}